<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>角色管理</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{padding:20px;background:#f5f5f5}
        .container{max-width:1200px;margin:0 auto;background:white;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
        .title{margin-bottom:20px;font-size:20px}
        .btn{padding:8px 16px;background:#409eff;color:white;border:none;border-radius:4px;cursor:pointer;margin-right:10px}
        .btn-danger{background:#f56c6c}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        table th,table td{border:1px solid #eee;padding:10px;text-align:center}
        table th{background:#f8f9fa}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center}
        .modal-content{background:white;padding:30px;border-radius:8px;width:400px}
        .modal-content input{width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:4px}
    </style>
</head>
<body>
<div class="container">
    <div class="title">角色管理</div>
    <button class="btn" onclick="openAddModal()">新增角色</button>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>角色名称</th>
            <th>角色标识</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="roleTable"></tbody>
    </table>
</div>

<div class="modal" id="roleModal">
    <div class="modal-content">
        <h3 id="modalTitle">新增角色</h3>
        <input type="hidden" id="id">
        <input type="text" id="roleName" placeholder="角色名称"><br>
        <input type="text" id="roleCode" placeholder="角色标识(admin/common)"><br>
        <button class="btn" onclick="saveRole()">保存</button>
    </div>
</div>

<script>
    window.onload = getRoleList;
    function getRoleList(){
        fetch("/role/list").then(res=>res.json()).then(data=>{
            let list = data.data.records;
            let html = "";
            list.forEach(item=>{
                html+=`
                <tr>
                    <td>${item.id}</td>
                    <td>${item.roleName}</td>
                    <td>${item.roleCode}</td>
                    <td>
                        <button class="btn" onclick="editRole(${item.id})">修改</button>
                        <button class="btn btn-danger" onclick="deleteRole(${item.id})">删除</button>
                        <button class="btn" onclick="toAssignPerm(${item.id})">分配权限</button>
                    </td>
                </tr>`
            })
            document.getElementById("roleTable").innerHTML = html;
        })
    }

    function openAddModal(){
        document.getElementById("modalTitle").innerText = "新增角色";
        document.getElementById("id").value = "";
        document.getElementById("roleName").value = "";
        document.getElementById("roleCode").value = "";
        document.getElementById("roleModal").style.display = "flex";
    }

    function editRole(id){
        fetch("/role/list").then(res=>res.json()).then(data=>{
            let obj = data.data.records.find(i=>i.id===id);
            document.getElementById("modalTitle").innerText = "修改角色";
            document.getElementById("id").value = obj.id;
            document.getElementById("roleName").value = obj.roleName;
            document.getElementById("roleCode").value = obj.roleCode;
            document.getElementById("roleModal").style.display = "flex";
        })
    }

    function saveRole(){
        let id = document.getElementById("id").value;
        let params = {
            roleName:document.getElementById("roleName").value,
            roleCode:document.getElementById("roleCode").value
        }
        let url = id ? "/role/update" : "/role/add";
        let method = id ? "PUT" : "POST";
        if(id) params.id = id;
        fetch(url,{
            method:method,
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(params)
        }).then(()=>{
            document.getElementById("roleModal").style.display = "none";
            getRoleList();
            alert("保存成功");
        })
    }

    function deleteRole(id){
        if(!confirm("确定删除？"))return;
        fetch(`/role/delete/${id}`,{method:"DELETE"}).then(()=>{
            getRoleList();
            alert("删除成功");
        })
    }
</script>
</body>
</html>
