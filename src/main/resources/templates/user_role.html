<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户分配角色</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        body {padding:30px;background:#f5f5f5;font-family:Arial;}
        .container {max-width:800px;margin:0 auto;background:white;padding:30px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
        .box {margin:20px 0;}
        h3 {margin-bottom:15px;}
        .btn {padding:8px 16px;background:#409eff;color:white;border:none;border-radius:4px;cursor:pointer;}
        .item {padding:10px;border:1px solid #ddd;margin:5px;display:inline-block;cursor:pointer;}
        .item.active {background:#e6f7ff;border-color:#409eff;}
    </style>
</head>
<body>
<div class="container">
    <h2>用户分配角色</h2>
    <div class="box">
        <h4>选择用户</h4>
        <div id="userList"></div>
    </div>
    <div class="box">
        <h4>选择角色</h4>
        <div id="roleList"></div>
    </div>
    <button class="btn" onclick="saveAssign()">保存分配</button>
</div>

<script>
    let currUserId = null;
    window.onload = () => {
        getUsers();
        getRoles();
    }

    // 获取所有用户
    function getUsers() {
        fetch("/user/list?pageNum=1&pageSize=100")
            .then(res => res.json())
            .then(data => {
                const users = data.data.records || [];
                let html = "";
                users.forEach(u => {
                    html += `<div class="item" onclick="selectUser(${u.id}, this)">${u.username}</div>`;
                });
                document.getElementById("userList").innerHTML = html;
            });
    }

    // 获取所有角色
    function getRoles() {
        fetch("/role/list?pageNum=1&pageSize=100")
            .then(res => res.json())
            .then(data => {
                const roles = data.data.records || [];
                let html = "";
                roles.forEach(r => {
                    html += `<div class="item"><input type="checkbox" value="${r.id}"> ${r.roleName}</div>`;
                });
                document.getElementById("roleList").innerHTML = html;
            });
    }

    // 选择用户
    function selectUser(id, el) {
        currUserId = id;
        document.querySelectorAll("#userList .item").forEach(i => i.classList.remove("active"));
        el.classList.add("active");
    }

    // 保存分配
    function saveAssign() {
        if (!currUserId) {
            alert("请先选择一个用户！");
            return;
        }
        const checks = document.querySelectorAll("#roleList input:checked");
        const roleIds = Array.from(checks).map(i => parseInt(i.value));

        fetch("/user/assignRole", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({userId: currUserId, roleIds: roleIds})
        }).then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    alert("分配成功！");
                } else {
                    alert("分配失败：" + data.msg);
                }
            });
    }
</script>
</body>
</html>
