<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        body{margin:0;padding:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#f5f5f5;}
        .login{width:300px;padding:30px;background:#fff;border-radius:8px;box-shadow:0 0 10px #ccc;}
        .login h2{text-align:center;margin-bottom:20px;}
        input{width:100%;padding:10px;margin:10px 0;box-sizing:border-box;}
        button{width:100%;padding:10px;background:#409eff;color:#fff;border:none;border-radius:4px;cursor:pointer;}
        .error{color:red;text-align:center;}
    </style>
</head>
<body>
<div class="login">
    <h2>后台管理系统</h2>

    <!-- 错误提示 -->
    <div th:if="${error}" class="error">[[${error}]]</div>

    <form action="/login" method="post">
        <input type="text" name="username" placeholder="用户名" required>
        <input type="password" name="password" placeholder="密码" required>
        <button type="submit">登录</button>
    </form>
</div>
</body>
