<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .title {
            margin-bottom: 20px;
            font-size: 20px;
        }
        .btn {
            padding: 8px 16px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-danger {
            background: #f56c6c;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table th, table td {
            border: 1px solid #eee;
            padding: 10px;
            text-align: center;
        }
        table th {
            background: #f8f9fa;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 400px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">用户管理列表</div>
    <button class="btn" onclick="openAddModal()">新增用户</button>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>昵称</th>
            <th>邮箱</th>
            <th>手机</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>
</div>

<!-- 新增/修改弹窗 -->
<div class="modal" id="userModal">
    <div class="modal-content">
        <h3 id="modalTitle">新增用户</h3>
        <input type="hidden" id="id">
        <input type="text" id="username" placeholder="用户名" required><br>
        <input type="password" id="password" placeholder="密码（新增必填）"><br>
        <input type="text" id="nickname" placeholder="昵称"><br>
        <input type="text" id="email" placeholder="邮箱"><br>
        <input type="text" id="phone" placeholder="手机号"><br>
        <button class="btn" onclick="saveUser()">保存</button>
    </div>
</div>

<script>
    window.onload = getUserList;

    // 查询用户列表
    function getUserList() {
        fetch("/user/list?pageNum=1&pageSize=100")
            .then(res => res.json())
            .then(data => {
                console.log("接口返回的数据：", data); // 关键：打印数据，看结构
                // 这里改成直接取 data.data，看结构再解析
                const pageData = data.data;
                const users = pageData.records || [];

                let html = "";
                users.forEach(user => {
                    html += `
            <tr>
                <td>${user.id}</td>
                <td>${user.username}</td>
                <td>${user.nickname}</td>
                <td>${user.email}</td>
                <td>${user.phone}</td>
                <td>
                    <button class="btn" onclick="editUser(${user.id})">修改</button>
                    <button class="btn btn-danger" onclick="deleteUser(${user.id})">删除</button>
                </td>
            </tr>`;
                });
                document.getElementById("userTable").innerHTML = html;
            });
    }

    // 打开新增
    function openAddModal() {
        document.getElementById("modalTitle").innerText = "新增用户";
        document.getElementById("id").value = "";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        document.getElementById("nickname").value = "";
        document.getElementById("email").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("userModal").style.display = "flex";
    }

    // 打开修改
    function editUser(id) {
        fetch("/user/list?pageNum=1&pageSize=100")
            .then(res => res.json())
            .then(data => {
                let user = data.data.records.find(u => u.id === id);
                document.getElementById("modalTitle").innerText = "修改用户";
                document.getElementById("id").value = user.id;
                document.getElementById("username").value = user.username;
                document.getElementById("nickname").value = user.nickname;
                document.getElementById("email").value = user.email;
                document.getElementById("phone").value = user.phone;
                document.getElementById("userModal").style.display = "flex";
            });
    }

    // 保存（新增/修改）
    function saveUser() {
        let id = document.getElementById("id").value;
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;
        let nickname = document.getElementById("nickname").value;
        let email = document.getElementById("email").value;
        let phone = document.getElementById("phone").value;

        let params = {
            username: username,
            password: password,
            nickname: nickname,
            email: email,
            phone: phone
        };

        let url = "/user/add";
        let method = "POST";

        if (id) {
            url = "/user/update";
            method = "PUT";
            params.id = id;
        }

        fetch(url, {
            method: method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(params)
        }).then(() => {
            document.getElementById("userModal").style.display = "none";
            getUserList();
            alert("保存成功");
        });
    }

    // 删除
    function deleteUser(id) {
        if (!confirm("确定删除？")) return;
        fetch(`/user/delete/${id}`, { method: "DELETE" })
            .then(() => {
                getUserList();
                alert("删除成功");
            });
    }
</script>
</body>
</html>
